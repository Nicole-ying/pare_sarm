# LunarLander-v2: 2M steps, 10 rounds
# llm_api_key: set via DEEPSEEK_API_KEY env var or put here

total_timesteps: 2000000
seed: 42
device: "cpu"
n_envs: 8
normalize: false
max_episode_steps: 1000
rounds: 10

evaluation:
  freq: 400000
  episodes: 10

checkpoint:
  freq: 400000

ppo:
  policy: "MlpPolicy"
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 64
  n_epochs: 4
  gamma: 0.999
  gae_lambda: 0.98
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

diagnostician:
  max_react_steps: 5
  temperature_a: 0.6
  temperature_b: 0.4
