# PPO config for LunarLander-v2 discrete
env_id: "LunarLander-v2-round0"

total_timesteps: 1000000
rounds: 10
seed: 42
device: "cuda"
n_envs: 16
normalize: false
max_episode_steps: 1000

# Agent flags
use_meta_analyzer: false      # true → cross-round Meta-Analyzer replaces Analyzer+Reflection
use_react_generator: false    # true → Generator verifies proposal evidence before writing code

evaluation:
  freq: 200000
  episodes: 10
  deterministic: true

checkpoint:
  freq: 200000

gif_steps:
  - 200000
  - 500000
  - 1000000
gif_fps: 30
gif_max_steps: 2000

ppo:
  policy: "MlpPolicy"
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 64
  n_epochs: 4
  gamma: 0.999
  gae_lambda: 0.98
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
